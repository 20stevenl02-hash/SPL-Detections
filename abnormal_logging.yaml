title: Abnormal Logging
id: f762744c-b1e4-403a-921f-7aa8f33c584d
author: Steven Lourenco 20stevenl02@gmail.com
date: 2026-05-08
description: Looks at an event code from windows event logs and calculates outliers based on the median absolute deviation of the count of logs
log_source:
  platform: splunk
  product: Microsoft
  category: Windows Event Logs
query:
  language: spl
  text: |
    EventCode=4688
    | stats c by host, EventCode
    | eventstats median("c") as median
    | eval absDev=(abs('c'-median))
    | eventstats median(absDev) as medianAbsDev
    | eval lowerBound=(median-medianAbsDev*exact(65)), upperBound=(median+medianAbsDev*exact(65))
    | eval isOutlier=if('c' < lowerBound OR 'c' > upperBound, 1, 0)
notes:
  - EventCode 4688 tracks process creation events
  - Uses Median Absolute Deviation (MAD) for robust outlier detection
  - median("c") calculates the median count of events
  - absDev calculates the absolute deviation of each value from the median
  - medianAbsDev computes the median absolute deviation
  - lowerBound and upperBound are calculated as a multiple (65x) of the median absolute deviation
  - Adjust the multiplier (currently 65) as needed for desired sensitivity to outliers
  - isOutlier flags values outside the bounds (1=outlier, 0=normal)
  - Higher multiplier = fewer outliers detected (less sensitive)
  - Lower multiplier = more outliers detected (more sensitive)

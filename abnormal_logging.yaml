title: Abnormal Logging
id: f762744c-b1e4-403a-921f-7aa8f33c584d
author: Steven Lourenco 20stevenl02@gmail.com
date: 2026-05-08
description: Looks at an event code from windows event logs and calculates outliers based on the median absolute deviation of the count of logs
log_source:
  platform: splunk
  product: Microsoft
  category: Windows Event Logs
query:
  language: spl
  text: |
    EventCode=4688
    | stats c by host, EventCode
    | eventstats median("c") as median
    | eval absDev=(abs('c'-median))
    | eventstats median(absDev) as medianAbsDev
    | eval lowerBound=(median-medianAbsDev*exact(65)), upperBound=(median+medianAbsDev*exact(65))
    | eval isOutlier=if('c' < lowerBound OR 'c' > upperBound, 1, 0)
notes:
  - EventCode 4688 tracks process creation events
  - Uses Median Absolute Deviation (MAD) for robust outlier detection
  - median("c") calculates the median count of events
  - absDev calculates the absolute deviation of each value from the median
  - medianAbsDev computes the median absolute deviation
  - lowerBound and upperBound are calculated as a multiple (65x) of the median absolute deviation
  - Adjust the multiplier (currently 65) as needed for desired sensitivity to outliers
  - isOutlier flags values outside the bounds (1=outlier, 0=normal)
  - Higher multiplier = fewer outliers detected (less sensitive)
  - Lower multiplier = more outliers detected (more sensitive)
false_positives:
  - New servers recently added to the environment with limited baseline data
  - Servers undergoing maintenance or scheduled downtime (low count outliers)
  - Development/test systems with sporadic usage patterns
  - Batch processing servers with scheduled intensive workloads (high count outliers)
  - Systems running automated deployment or software installation activities
  - Domain controllers or build servers with naturally high process creation rates
  - Servers with recently changed roles or workloads
  - Time-based variations (weekend vs weekday activity, business hours vs off-hours)
mitigation:
  - Investigate high outliers for potential malicious process execution or lateral movement
  - Investigate low outliers for potential logging disruption, system compromise, or service failures
  - Correlate with other security events from the same host
  - Review process command lines and parent-child relationships for suspicious activity
  - Check for signs of log tampering or logging service interruptions on low-count outliers
  - Validate system health and availability on systems with abnormal counts
  - Consider creating separate baselines for different server roles or time periods
